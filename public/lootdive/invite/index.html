<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Primary Meta Tags -->
    <title>ルートダイブ に招待されました！</title>
    <meta name="description" content="招待コードを使って ルートダイブ を始めよう！完全オートバトルのハクスラRPG。" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://astapi.net/lootdive/invite" />
    <meta property="og:title" content="ルートダイブ に招待されました！" />
    <meta property="og:description" content="招待コードを使って ルートダイブ を始めよう！完全オートバトルのハクスラRPG。装備とパッシブでビルドを組み、ダンジョン周回で戦利品を厳選しよう。" />
    <meta property="og:image" content="https://astapi.net/images/lootdive/og-invite.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ルートダイブ" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://astapi.net/lootdive/invite" />
    <meta name="twitter:title" content="ルートダイブ に招待されました！" />
    <meta name="twitter:description" content="招待コードを使って ルートダイブ を始めよう！完全オートバトルのハクスラRPG。" />
    <meta name="twitter:image" content="https://astapi.net/images/lootdive/og-invite.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --accent: #BFFF00;
        --accent-dim: rgba(191, 255, 0, 0.12);
        --accent-border: rgba(191, 255, 0, 0.25);
        --bg: #000000;
        --card-bg: #111111;
        --border: #1A1A1A;
        --text: #FFFFFF;
        --text-muted: #999999;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .invite-container {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 24px;
      }

      /* Header */
      .invite-header {
        width: 100%;
        padding: 20px 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .invite-header img {
        width: 32px;
        height: 32px;
        border-radius: 8px;
      }

      .invite-header span {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }

      /* Main content */
      .invite-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 32px;
        padding: 40px 0;
      }

      .invite-icon {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 0 40px rgba(191, 255, 0, 0.15);
      }

      .invite-badge {
        display: inline-block;
        padding: 6px 16px;
        background: var(--accent-dim);
        border: 1px solid var(--accent-border);
        border-radius: 100px;
        font-size: 13px;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 0.02em;
      }

      .invite-title {
        font-size: 28px;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }

      .invite-desc {
        font-size: 15px;
        line-height: 1.6;
        color: var(--text-muted);
        max-width: 360px;
      }

      /* Invite code display */
      .invite-code-box {
        width: 100%;
        max-width: 320px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .invite-code-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .invite-code-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.1em;
        font-family: 'SF Mono', 'Fira Code', monospace;
        word-break: break-all;
      }

      .invite-code-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      /* Buttons */
      .invite-actions {
        width: 100%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn-primary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 16px 24px;
        background: var(--accent);
        color: #000000;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      .btn-primary:hover { opacity: 0.9; }

      .btn-secondary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 14px 24px;
        background: transparent;
        color: var(--text);
        font-size: 15px;
        font-weight: 500;
        border: 1px solid var(--border);
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: border-color 0.2s;
      }

      .btn-secondary:hover { border-color: var(--accent-border); }

      .btn-icon {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }

      /* Separator */
      .invite-sep {
        width: 100%;
        max-width: 320px;
        display: flex;
        align-items: center;
        gap: 16px;
        color: var(--text-muted);
        font-size: 12px;
      }

      .invite-sep::before,
      .invite-sep::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* PC message */
      .pc-message {
        width: 100%;
        max-width: 320px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 24px;
        text-align: center;
      }

      .pc-message p {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .pc-message .qr-hint {
        margin-top: 12px;
        font-size: 12px;
        color: var(--text-muted);
        opacity: 0.6;
      }

      /* Footer */
      .invite-footer {
        width: 100%;
        padding: 24px 0;
        text-align: center;
        font-size: 12px;
        color: #404040;
        border-top: 1px solid var(--border);
      }

      .invite-footer a {
        color: #404040;
        text-decoration: none;
      }

      .invite-footer a:hover {
        color: var(--text-muted);
      }

      /* App Store badge */
      .appstore-badge {
        display: inline-block;
      }

      .appstore-badge img {
        height: 54px;
        width: auto;
      }

      /* Hidden */
      .hidden { display: none !important; }

      /* Copy feedback */
      .copy-toast {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--card-bg);
        border: 1px solid var(--accent-border);
        color: var(--accent);
        padding: 10px 20px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        opacity: 0;
        transition: all 0.3s ease;
        pointer-events: none;
        z-index: 100;
      }

      .copy-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="invite-container">
      <!-- Header -->
      <div class="invite-header">
        <img src="/images/lootdive/icon.png" alt="ルートダイブ" />
        <span>ルートダイブ</span>
      </div>

      <!-- Main -->
      <div class="invite-main">
        <img src="/images/lootdive/icon.png" alt="ルートダイブ" class="invite-icon" />
        <span class="invite-badge">INVITATION</span>
        <h1 class="invite-title">ルートダイブ に<br>招待されました！</h1>
        <p class="invite-desc">
          友達からの招待です。招待コードを使ってゲームを始めると、特別な報酬がもらえます。
        </p>

        <!-- Invite code -->
        <div id="code-box" class="invite-code-box">
          <span class="invite-code-label">招待コード</span>
          <span id="invite-code" class="invite-code-value">---</span>
          <span class="invite-code-hint">アプリ内で入力してください</span>
        </div>

        <!-- Mobile: App launch + Store buttons -->
        <div id="mobile-actions" class="invite-actions hidden">
          <a id="btn-open-app" href="#" class="btn-primary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            </svg>
            アプリで開く
          </a>
          <div class="invite-sep">または</div>
          <a id="btn-appstore" href="https://apps.apple.com/jp/app/lootdive/id6758569313" class="appstore-badge hidden">
            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ja-jp?size=250x83" alt="App Store からダウンロード" />
          </a>
        </div>

        <!-- PC: Message -->
        <div id="pc-actions" class="invite-actions hidden">
          <a href="https://apps.apple.com/jp/app/lootdive/id6758569313" class="appstore-badge">
            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ja-jp?size=250x83" alt="App Store からダウンロード" />
          </a>
          <button id="btn-copy" class="btn-secondary" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            招待コードをコピー
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="invite-footer">
        <a href="/lootdive">ルートダイブ</a> &middot; <a href="/">astapi Games</a>
      </div>
    </div>

    <!-- Copy toast -->
    <div id="copy-toast" class="copy-toast">コピーしました</div>

    <script>
      (function () {
        // --- Config ---
        var APP_STORE_URL = 'https://apps.apple.com/jp/app/lootdive/id6758569313';
        var UNIVERSAL_LINK_BASE = 'https://astapi.net/lootdive/invite';

        // --- Query param ---
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code') || '';

        // Display invite code
        var codeEl = document.getElementById('invite-code');
        var codeBox = document.getElementById('code-box');
        if (code) {
          codeEl.textContent = code;
        } else {
          codeBox.classList.add('hidden');
        }

        // --- Platform detection ---
        var ua = navigator.userAgent || '';
        var isIOS = /iPhone|iPad|iPod/i.test(ua);

        var mobileActions = document.getElementById('mobile-actions');
        var pcActions = document.getElementById('pc-actions');

        if (isIOS) {
          mobileActions.classList.remove('hidden');

          // Show App Store button
          document.getElementById('btn-appstore').classList.remove('hidden');

          // "Open in app" button - Universal Link
          var btnOpenApp = document.getElementById('btn-open-app');
          var universalLink = UNIVERSAL_LINK_BASE + (code ? '?code=' + encodeURIComponent(code) : '');
          btnOpenApp.href = universalLink;
        } else {
          // PC and other platforms
          pcActions.classList.remove('hidden');
        }

        // Copy button
        var btnCopy = document.getElementById('btn-copy');
        if (btnCopy && code) {
          btnCopy.addEventListener('click', function () {
            navigator.clipboard.writeText(code).then(function () {
              var toast = document.getElementById('copy-toast');
              toast.classList.add('show');
              setTimeout(function () {
                toast.classList.remove('show');
              }, 2000);
            });
          });
        } else if (btnCopy && !code) {
          btnCopy.classList.add('hidden');
        }
      })();
    </script>
  </body>
</html>
